name: Attic

on:
  push:
    branches: [ main ]

env:
  USER: root

jobs:
  build:
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - run: apt update && apt install -y sudo
      - uses: https://github.com/cachix/install-nix-action@v31
        with:
          enable_kvm: false
          github_access_token: '${{ secrets.ACCESS_TOKEN_GITHUB }}'
      - name: Attic
        uses: https://github.com/ryanccn/attic-action@v0
        with:
          endpoint: https://attic.chvp.be
          cache: chvp
          token: '${{ secrets.ATTIC_AUTH_TOKEN }}'
          skip-push: true
      - run: nix build -L --no-link .#packages.x86_64-linux.default
      - run: nix build -L --no-link .#devShells.x86_64-linux.default
      - run: nix eval --json ".#packages.x86_64-linux.default.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
      - run: nix eval --json ".#devShells.x86_64-linux.default.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
